<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: Inter, sans-serif; font-size: 48px; font-weight: 700; fill: #1a365d; }
      .subtitle { font-family: Inter, sans-serif; font-size: 24px; fill: #2b6cb0; }
      .body { font-family: Inter, sans-serif; font-size: 20px; fill: #1a202c; }
      .small { font-family: Inter, sans-serif; font-size: 16px; fill: #1a202c; }
      .accent { font-family: Inter, sans-serif; font-size: 20px; fill: #e53e3e; font-weight: 600; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg-grad)"/>
  <image x="700" y="200" width="200" height="60" href="data:image/svg+xml;base64," preserveAspectRatio="xMidYMid meet"/>
  <text x="800" y="420" text-anchor="middle" class="title">Presentación de prueba</text>
  
  <text x="800" y="470" text-anchor="middle" class="subtitle">Pipeline de documentación aramirez-ai — Todos los artefactos gda-ai</text>
  <rect x="740" y="510" width="120" height="4" rx="2" fill="#2b6cb0"/>
  <text x="800" y="840" text-anchor="middle" class="small">aramirez-ai</text>

  <text x="1560" y="880" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#999">© aramirez-ai</text>
</svg>